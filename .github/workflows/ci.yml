name: CI

on:
  push:
    paths:
      - "packages/**"
      - "apps/**"
      - ".github/workflows/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "packages/**"
      - "apps/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

      - name: Secret scan
        run: |
          echo "Scanning for hardcoded secrets..."
          cat > /tmp/secret-patterns.txt <<PATTERNS
          PRIVATE.KEY
          sk_live_
          sk_test_
          aws_secret
          PATTERNS
          FOUND=0
          while IFS= read -r pattern; do
            pattern=$(echo "$pattern" | xargs)
            [ -z "$pattern" ] && continue
            if git grep -lI "$pattern" -- ':!*.md' ':!.github/workflows/*' ':!node_modules' 2>/dev/null; then
              echo "FAIL: potential secret pattern '$pattern' found"
              FOUND=1
            fi
          done < /tmp/secret-patterns.txt
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No hardcoded secrets detected"

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo test --lib
        working-directory: apps/desktop/src-tauri
